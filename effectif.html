<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Effectif — CFLD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Inter+Tight:wght@400..700&family=Space+Grotesk:wght@400..700&family=Bebas+Neue&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
.filters {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 32px 0 60px;
  border-bottom: 1px solid var(--line);
}
.filter-btn {
  padding: 10px 18px; border-radius: 999px;
  border: 1px solid var(--line);
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;
  background: var(--paper);
  transition: all .2s;
}
.filter-btn:hover { border-color: var(--ink); }
.filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.filter-btn .count {
  margin-left: 8px; opacity: .5; font-weight: 600;
}

.roster {
  padding: 60px 0 140px;
}
.roster-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
}
.player {
  perspective: 1200px;
  aspect-ratio: 3/4;
  cursor: pointer;
  position: relative;
  transition: opacity .4s, transform .4s;
}
.player.hidden { display: none; }
.player-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform .7s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d;
}
.player:hover .player-inner,
.player.flipped .player-inner {
  transform: rotateY(180deg);
}
.player-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  border-radius: 2px;
}
.player-front {
  background:
    linear-gradient(180deg, transparent 50%, rgba(11,11,11,0.85) 100%),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 8px, rgba(255,255,255,0.08) 8px 16px),
    var(--ink);
  color: var(--paper);
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 20px;
}
.player-num {
  font-family: var(--font-display);
  font-size: 96px; line-height: 0.85;
  font-weight: 500; letter-spacing: -0.04em;
  align-self: flex-end;
  color: rgba(246,244,239,0.4);
}
.player-info { position: relative; z-index: 1; }
.player-info .pos {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.16em; color: var(--green-bright);
  text-transform: uppercase; margin-bottom: 8px;
}
.player-info h3 {
  font-size: 24px; line-height: 1.05;
  color: var(--paper);
  font-family: var(--font-display);
  letter-spacing: -0.01em;
}
.player-back {
  background: var(--green-deep);
  color: var(--paper);
  transform: rotateY(180deg);
  padding: 24px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.player-back .head {
  display: flex; justify-content: space-between; align-items: start;
}
.player-back .head .num {
  font-family: var(--font-display); font-size: 56px;
  line-height: 0.9; letter-spacing: -0.03em;
}
.player-back .head .pos {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(246,244,239,0.7);
  text-align: right;
}
.player-back h3 { font-size: 22px; line-height: 1.05; }
.player-back .stats {
  border-top: 1px solid rgba(246,244,239,0.2);
  padding-top: 16px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.player-back .stats .s {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(246,244,239,0.6);
}
.player-back .stats .v {
  font-family: var(--font-display); font-size: 24px;
  font-weight: 500; line-height: 1; margin-top: 4px;
}

/* --- Responsive tablet --- */
@media (max-width: 1023px) {
  .roster-grid { grid-template-columns: repeat(3, 1fr); }
}

/* --- Responsive mobile --- */
@media (max-width: 767px) {
  .roster-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
  .player-num { font-size: 72px; }
  .player-back .head .num { font-size: 44px; }
  .filters { padding: 24px 0 40px; }
}
</style>
</head>
<body data-screen-label="03 Effectif">
<div id="nav-mount"></div>

<main class="page">
  <div class="page-title-spread">
    <h1>Effectif</h1>
    <div class="meta">
      <span>Section 03 / 08</span>
      <span>Saison 2025—2026</span>
      <span>22 joueurs</span>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-pos="all">Tous <span class="count">22</span></button>
    <button class="filter-btn" data-pos="GK">Gardiens <span class="count">3</span></button>
    <button class="filter-btn" data-pos="DEF">Défenseurs <span class="count">7</span></button>
    <button class="filter-btn" data-pos="MID">Milieux <span class="count">7</span></button>
    <button class="filter-btn" data-pos="ATT">Attaquants <span class="count">5</span></button>
  </div>

  <section class="roster">
    <div class="roster-grid" id="roster"></div>
  </section>
</main>

<div id="footer-mount"></div>
<div id="fab-mount"></div>
<script src="assets/shell.js"></script>
<script>
CFLD.mountShell('effectif.html');

const players = [
  ['01','GK','Ibrahim Touré','24','1m92'],
  ['12','GK','Yves Koffi','19','1m88'],
  ['30','GK','Pape Diop','22','1m90'],
  ['02','DEF','Souleymane Coulibaly','27','1m84'],
  ['03','DEF','Adama Bamba','25','1m82'],
  ['04','DEF','Émile Yao','23','1m86'],
  ['05','DEF','Karim Sangaré','26','1m83'],
  ['14','DEF','Lassana Diallo','22','1m80'],
  ['22','DEF','Moussa Konaté','24','1m81'],
  ['25','DEF','Étienne Brou','21','1m79'],
  ['06','MID','Cheick Diaby','26','1m78'],
  ['08','MID','Drissa Fofana','24','1m76'],
  ['10','MID','Ousmane Traoré','22','1m74'],
  ['16','MID','Yannick Gnagne','25','1m77'],
  ['18','MID','Salif Doumbia','23','1m79'],
  ['20','MID','Aboubakar Tagro','21','1m75'],
  ['28','MID','Idriss Bah','19','1m72'],
  ['07','ATT','Mahamadou Soro','23','1m81'],
  ['09','ATT','Junior Akré','25','1m83'],
  ['11','ATT','Kévin Anoma','22','1m78'],
  ['17','ATT','Alassane N\'Doye','24','1m80'],
  ['19','ATT','Brice Kouadio','20','1m76'],
];
const POS_LABEL = { GK:'Gardien', DEF:'Défenseur', MID:'Milieu', ATT:'Attaquant' };

const grid = document.getElementById('roster');
grid.innerHTML = players.map(([num,pos,name,age,h], i) => {
  const apps = 12 + (i*3) % 22;
  const goals = pos==='ATT' ? 4 + (i%9) : pos==='MID' ? 1 + (i%4) : pos==='DEF' ? (i%2) : 0;
  return `
  <div class="player" data-pos="${pos}" onclick="this.classList.toggle('flipped')">
    <div class="player-inner">
      <div class="player-face player-front">
        <div class="player-num">${num}</div>
        <div class="player-info">
          <div class="pos">${POS_LABEL[pos]}</div>
          <h3>${name}</h3>
        </div>
      </div>
      <div class="player-face player-back">
        <div>
          <div class="head">
            <div class="num">${num}</div>
            <div class="pos">${POS_LABEL[pos]}</div>
          </div>
          <h3 style="margin-top:24px;">${name}</h3>
        </div>
        <div class="stats">
          <div><div class="s">Âge</div><div class="v">${age}</div></div>
          <div><div class="s">Matchs</div><div class="v">${apps}</div></div>
          <div><div class="s">Buts</div><div class="v">${goals}</div></div>
        </div>
      </div>
    </div>
  </div>`;
}).join('');

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b===btn));
  const pos = btn.dataset.pos;
  document.querySelectorAll('.player').forEach(p => {
    p.classList.toggle('hidden', pos !== 'all' && p.dataset.pos !== pos);
  });
});
</script>
</body>
</html>
